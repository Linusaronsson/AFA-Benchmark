[tool:pytest]
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
addopts = -v --tb=short
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

[pytest]
markers =
    optional: tests that are skipped unless explicitly selected
addopts = -m "not optional"
