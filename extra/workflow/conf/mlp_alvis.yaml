# MLP classifier training for Alvis cluster (tabular + MNIST/FashionMNIST)
#
# Usage:
#   snakemake -s extra/workflow/snakefiles/orchestration/mlp.smk \
#       --configfile extra/workflow/conf/mlp_alvis.yaml \
#       --profile extra/workflow/profiles/alvis_rezvan

dataset_path_prefix: extra/data
output_path_prefix: extra/output/classifiers
dataset_instance_indices: [0, 1, 2, 3, 4]
device: cuda
use_wandb: false
smoke_test: false

# ============================================================================
# Datasets (tabular only)
# ============================================================================
datasets:
  # Tabular
  - cube
  - cube_without_noise
  - afa_context
  - afa_context_without_noise
  - actg
  - ckd
  - diabetes
  - physionet
  - miniboone
  - bank_marketing
  - mnist
  - fashion_mnist

# ============================================================================
# Model hyperparameters
# ============================================================================
epochs: 100
batch_size: 128
lr: 1e-3
num_cells: [256, 256]
dropout: 0.2
min_masking_probability: 0.0
max_masking_probability: 0.9
