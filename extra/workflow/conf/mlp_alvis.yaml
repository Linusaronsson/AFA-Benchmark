# Full MLP classifier training config for Alvis cluster
#
# Usage:
#   snakemake -s extra/workflow/snakefiles/mlp.smk \
#       --configfile extra/workflow/conf/mlp_alvis.yaml \
#       --profile extra/workflow/profiles/alvis -j 50

# Data paths
dataset_path_prefix: extra/data
output_path_prefix: extra/output/classifiers

# ALL available datasets
datasets:
  # Synthetic tabular (small, fast)
  - cube
  - cube_without_noise
  - afa_context
  - afa_context_without_noise
  # Real-world tabular
  - actg
  - ckd
  - diabetes
  - physionet
  - miniboone
  - bank_marketing
  # Image datasets
  - synthetic_mnist
  - synthetic_mnist_without_noise

# 5 seeds for statistical significance
dataset_instance_indices: [0, 1, 2, 3, 4]

# Training settings for Alvis (GPU)
device: cuda
use_wandb: false
smoke_test: false

# Model hyperparameters
epochs: 100
batch_size: 128
lr: 1e-3
num_cells: [256, 256]
dropout: 0.2
min_masking_probability: 0.0
max_masking_probability: 0.9
