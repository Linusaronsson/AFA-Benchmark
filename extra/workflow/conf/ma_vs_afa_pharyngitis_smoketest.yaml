# Smoke-test comparison on Pharyngitis: AFA policies vs MA no-acquisition baseline.
#
# Example:
#   snakemake -s extra/workflow/snakefiles/orchestration/pipeline.smk \
#     --configfile extra/workflow/conf/ma_vs_afa_pharyngitis_smoketest.yaml \
#     --configfile extra/workflow/conf/method_options.yaml \
#     --configfile extra/workflow/conf/pretrain_mapping.yaml \
#     --configfile extra/workflow/conf/classifier_names_malearn.yaml \
#     -j 4

dataset_instance_indices: [0]
initializer: missingness
eval_dataset_split: val
device: cpu
use_wandb: false
smoke_test: true

datasets:
  - pharyngitis

methods:
  - stop_baseline
  - ma2018_external
  - jafa

method_sets:
  ma_vs_afa:
    - stop_baseline
    - ma2018_external
    - jafa

unmaskers:
  default: direct

eval_hard_budgets:
  default: [5]

soft_budget_params:
  stop_baseline:
    default: []
  ma2018_external:
    default:
      - [0.01, null]
  jafa:
    default:
      - [0.01, null]
