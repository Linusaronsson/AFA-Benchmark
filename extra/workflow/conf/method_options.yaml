method_options:
  aaco:
    train_script_name: "aaco"
    hard_budget_ignored_datasets: [mnist, fashion_mnist, imagenette, afa_context_v2, afa_context_v2_without_noise]
    soft_budget_ignored_datasets: [mnist, fashion_mnist, imagenette, afa_context_v2, afa_context_v2_without_noise]
  aaco_nn:
    pretrained_model_name: "aaco"
    train_script_name: "aaco_nn"
    hard_budget_ignored_datasets: [mnist, fashion_mnist, imagenette]
    soft_budget_ignored_datasets: [mnist, fashion_mnist, imagenette]
  ma2018_builtin:
    pretrained_model_name: "pvae"
    train_script_name: "ma2018_builtin"
    use_max_hard_budget_when_training_soft_budget: true
    eval_batch_size:
      default: 8
    eval_to_train_hard_budget_mapping:
      cube_nonuniform_costs:
        2: 20
        4: 20
        7: 20
    hard_budget_ignored_datasets: [mnist, fashion_mnist]
  ma2018_external:
    pretrained_model_name: "pvae"
    train_script_name: "ma2018_external"
    use_max_hard_budget_when_training_soft_budget: true
    eval_batch_size:
      default: 8
    eval_to_train_hard_budget_mapping:
      cube_nonuniform_costs:
        2: 20
        4: 20
        7: 20
    hard_budget_ignored_datasets: [mnist, fashion_mnist]
  covert2023:
    pretrained_model_name: "gdfs"
    train_script_name: "covert2023"
    use_max_hard_budget_when_training_soft_budget: true
    eval_batch_size:
      default: 128
    eval_to_train_hard_budget_mapping:
      cube_nonuniform_costs:
        2: 20
        4: 20
        7: 20
  gadgil2023:
    pretrained_model_name: "dime"
    train_script_name: "gadgil2023"
    use_max_hard_budget_when_training_soft_budget: true
    eval_batch_size:
      default: 128
    eval_to_train_hard_budget_mapping:
      cube_nonuniform_costs:
        2: 20
        4: 20
        7: 20
  cae:
    train_script_name: "cae"
    eval_to_train_hard_budget_mapping:
      cube_nonuniform_costs:
        2: 20
        4: 20
        7: 20
  permutation:
    train_script_name: "permutation"
    eval_to_train_hard_budget_mapping:
      cube_nonuniform_costs:
        2: 20
        4: 20
        7: 20
  jafa:
    pretrained_model_name: "jafa"
    train_script_name: "shim2018"
    eval_batch_size: &rl_eval_batch_size
      default: 128
  odin_model_based:
    pretrained_model_name: "pvae"
    train_script_name: "zannone2019"
    method_specific_params:
      - "additional_generation_fraction=1.0"
    eval_batch_size: *rl_eval_batch_size
  odin_model_free:
    pretrained_model_name: "pvae"
    train_script_name: "zannone2019"
    method_specific_params:
      - "additional_generation_fraction=0.0"
    eval_batch_size: *rl_eval_batch_size
  ol_without_mask:
    pretrained_model_name: "ol_without_mask"
    train_script_name: "kachuee2019"
    eval_batch_size: *rl_eval_batch_size
  ol_with_mask:
    pretrained_model_name: "ol_with_mask"
    train_script_name: "kachuee2019"
    eval_batch_size: *rl_eval_batch_size
  random_dummy:
    train_script_name: "random_dummy"
    eval_batch_size: &dummy_eval_batch_size
      default: 128
    # Example if a different budget should be used during training compared to evaluation for the hard budget case
    # eval_to_train_hard_budget_mapping:
    #   cube_without_noise:
    #     10: 5
  sequential_dummy:
    train_script_name: "sequential_dummy"
    eval_batch_size: *dummy_eval_batch_size
    # Example if max hard budget should be applied when training for soft budget
    # use_max_hard_budget_when_training_for_soft_budget: true
