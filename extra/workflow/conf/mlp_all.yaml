# Full configuration for training MLP classifiers on ALL datasets
#
# This includes both tabular and image datasets.
#
# Usage:
#   snakemake -s extra/workflow/snakefiles/mlp.smk \
#       --configfile extra/workflow/conf/mlp_all.yaml -j 4

# Data paths
dataset_path_prefix: extra/data
output_path_prefix: extra/output/classifiers

# All available datasets
datasets:
  # Small tabular (600 samples, 20-33 features)
  - cube
  - cube_without_noise
  - afa_context
  - afa_context_without_noise
  # Image datasets
  - synthetic_mnist_fast  # 60 samples, 28x28, 10 classes (quick testing)
  # Uncomment as needed:
  # - synthetic_mnist     # Full synthetic MNIST
  # - actg
  # - ckd
  # - diabetes
  # - physionet
  # - miniboone
  # - bank_marketing

# Dataset instances (5 seeds for statistical significance)
dataset_instance_indices: [0, 1, 2, 3, 4]

# Training settings
device: cpu  # Use "cuda" for GPU
use_wandb: false
smoke_test: false

# ============================================================================
# Model hyperparameters
# ============================================================================
# Default values tuned for small tabular datasets
# For image datasets, you may want to increase num_cells

epochs: 100
batch_size: 64
lr: 1e-3
num_cells: [128, 128]
dropout: 0.2
min_masking_probability: 0.0
max_masking_probability: 0.9
