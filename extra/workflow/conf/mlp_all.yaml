# Full configuration for training MLP classifiers on all tabular datasets
# (including MNIST/FashionMNIST).
#
# Usage:
#   snakemake -s extra/workflow/snakefiles/orchestration/mlp.smk \
#       --configfile extra/workflow/conf/mlp_all.yaml -j 4

# Data paths
dataset_path_prefix: extra/data
output_path_prefix: extra/output/classifiers

# All tabular datasets
datasets:
  - actg
  - cube_nm
  - cube_nm_without_noise
  - bank_marketing
  - ckd
  - cube
  - cube_without_noise
  - diabetes
  - miniboone
  - physionet
  - mnist
  - fashion_mnist

# Dataset instances (5 seeds for statistical significance)
dataset_instance_indices: [0, 1, 2, 3, 4]

# Training settings
device: cpu  # Use "cuda" for GPU
use_wandb: false
smoke_test: false

# ============================================================================
# Model hyperparameters
# ============================================================================
# Default values tuned for tabular datasets

epochs: 100
batch_size: 64
lr: 1e-3
num_cells: [128, 128]
dropout: 0.2
min_masking_probability: 0.0
max_masking_probability: 0.9
