# Synthetic CUBE-NM / CUBE-NM-AR train-missing / eval-cold workflow.
#
# This is a hard-budget-only leaf config for `pipeline.smk`.
# Use together with train initializers such as:
#   cold,
#   mcar_p01 / mcar_p03 / mcar_p05,
#   mar_p01 / mar_p03 / mar_p05,
#   mnar_logistic_p01 / mnar_logistic_p03 / mnar_logistic_p05
#
# Static methods are intentionally excluded here. The current PT/CAE pipeline is
# not semantically valid on grouped-selection datasets such as `afa_context_v2`
# and `cube_nm_ar`.

dataset_instance_indices: [0, 1, 2, 3, 4]
eval_dataset_split: val
stop_shield_deltas: []
cube_nm_ar_budget_mode: hard
device: cpu
use_wandb: false
smoke_test: false

datasets:
  - afa_context_v2
  - cube_nm_ar

methods:
  - jafa
  - gadgil2023
  - gadgil2023_ipw_feature_marginal
  - aaco_full
  - aaco_mask_aware
  - aaco_dr

method_sets:
  synthetic_train_missing_eval_cold_core:
    - jafa
    - aaco_dr
    - aaco_mask_aware
    - gadgil2023_ipw_feature_marginal
  synthetic_train_missing_eval_cold_controls:
    - jafa
    - aaco_full
    - aaco_mask_aware
    - aaco_dr
    - gadgil2023
    - gadgil2023_ipw_feature_marginal

eval_hard_budgets:
  default: [3, 5, 7, 10, 14]
  afa_context_v2: [3, 5, 7, 10, 14]
  cube_nm_ar: [6, 7, 8]

soft_budget_params:
  jafa:
    default: []
  gadgil2023:
    default: []
  gadgil2023_ipw_feature_marginal:
    default: []
  aaco_full:
    default: []
  aaco_mask_aware:
    default: []
  aaco_dr:
    default: []
