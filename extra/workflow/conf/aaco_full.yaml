# Full configuration for AACO experiments
#
# PREREQUISITE: Train MLP classifiers first!
#   snakemake -s extra/workflow/snakefiles/mlp.smk \
#       --configfile extra/workflow/conf/mlp.yaml -j 4
#
# This config runs:
# 1. Train AACO methods with various cost parameters
# 2. Optionally train AACO+NN (behavioral cloning from AACO)
# 3. Evaluate all methods
#
# Usage:
#   snakemake -s extra/workflow/snakefiles/AACO.smk \
#       --configfile extra/workflow/conf/aaco_full.yaml -j 4

# Data paths
dataset_path_prefix: extra/data

# Dataset instances to use (5 seeds for statistical significance)
dataset_instance_indices: [0, 1, 2, 3, 4]

# Initializer for evaluation (random = random single-feature initializer)
initializer: random

# Which split to evaluate on
eval_dataset_split: test

# Training settings
device: cpu
use_wandb: false
smoke_test: false

# ============================================================================
# Datasets
# ============================================================================
# Tabular datasets for AACO experiments
datasets:
  - actg
  - afa_context
  - afa_context_without_noise
  - bank_marketing
  - ckd
  - cube
  - cube_without_noise
  - diabetes
  - miniboone
  - physionet

# ============================================================================
# Unmaskers
# ============================================================================
# Unmaskers determine how selections map to features
# - direct: each selection reveals one feature (for tabular data)
# - 28x28_to_7x7: each selection reveals a 4x4 patch (for images)

unmaskers:
  default: direct

# ============================================================================
# Hard budgets for training and evaluation
# ============================================================================
# Hard budget = maximum number of features that can be acquired
# For tabular datasets, 5-15 is a common starting range

hard_budgets:
  default: [5, 10, 15]

# ============================================================================
# Cost parameters (soft budget)
# ============================================================================
# Cost parameter controls the tradeoff between accuracy and acquisition cost
# Higher cost = fewer features acquired
# Range depends on dataset complexity:
# - Simple tabular: 0.01 - 0.2

cost_params:
  default: [0.01, 0.05, 0.1]

# ============================================================================
# AACO+NN Training
# ============================================================================
# train_aaco_nn: Train neural network policy via behavioral cloning from AACO
# soft_budget_eval: Also evaluate with soft budget (no hard limit)

train_aaco_nn: true
soft_budget_eval: true
