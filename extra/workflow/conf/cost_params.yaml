# Cost parameters (soft budget) for AACO training
# These control how much the oracle penalizes feature acquisitions
cost_params:
  default: [0.01, 0.05, 0.1]

  # Small synthetic datasets - finer granularity
  cube: [0.001, 0.01, 0.05, 0.1]
  cube_without_noise: [0.001, 0.01, 0.05, 0.1]
  cube_nm: [0.001, 0.01, 0.05, 0.1]
  cube_nm_without_noise: [0.001, 0.01, 0.05, 0.1]

  # Real-world tabular datasets
  actg: [0.001, 0.01, 0.05]
  ckd: [0.001, 0.01, 0.05]
  diabetes: [0.0001, 0.001, 0.01, 0.05]
  physionet: [0.0001, 0.001, 0.01]
  miniboone: [0.0001, 0.001, 0.01]
  bank_marketing: [0.001, 0.01, 0.05]

  # High-dimensional image datasets - smaller costs
  MNIST: [0.00001, 0.0001, 0.001, 0.01]
  FashionMNIST: [0.00001, 0.0001, 0.001, 0.01]
  synthetic_mnist: [0.0001, 0.001, 0.01]
  synthetic_mnist_without_noise: [0.0001, 0.001, 0.01]
