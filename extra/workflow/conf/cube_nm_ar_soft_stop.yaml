# Focused CUBE-NM-AR run for soft stopping and stop shielding.
#
# This file is a leaf config for `cube_nm_ar_suite.smk`.
# It complements `cube_nm_ar_hard.yaml`.

dataset_instance_indices: [0, 1, 2, 3, 4]
train_initializer: cube_nm_ar
# Override train_initializer=cold for the full-support baseline.
eval_initializer: cold
eval_dataset_split: val
stop_shield_deltas: [0.2, 0.3]
cube_nm_ar_budget_mode: soft
device: cpu
use_wandb: false
smoke_test: false

datasets:
  - cube_nm_ar

methods:
  - aaco_full

method_sets:
  cube_nm_ar_soft_stop:
    - aaco_full

eval_hard_budgets:
  # Soft-stop plots ignore hard-budget eval runs, but discriminative
  # methods still need a finite training horizon. The workflow reuses the
  # largest configured hard budget for that purpose.
  default: [7]
  cube_nm_ar: [7]

soft_budget_params:
  aaco_full:
    default: []
    cube_nm_ar:
      - [0.1, 0.1]
      - [0.3, 0.3]
      - [1.2, 1.2]
