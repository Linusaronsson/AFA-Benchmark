# Overlay config for running missingness orchestration workflows on Minerva.
#
# Training-miss experiments (CUBE + ACTG):
#   uv run snakemake \
#     -s extra/workflow/snakefiles/orchestration/initializer_comparison.smk \
#     --configfile \
#       extra/workflow/conf/train_missing_eval_cold_initializer_comparison.yaml \
#       extra/workflow/conf/missingness_minerva_rezvan.yaml \
#     --config \
#       "datasets=[cube_without_noise,actg175]" \
#       "methods=[gadgil2023,gadgil2023_ipw_feature_marginal,aaco_full,aaco_zero_fill,aaco_mask_aware,aaco_dr,ol_with_mask]" \
#     -j 1 \
#     all
#
# CUBE-NM-AR suite (soft-budget only):
#   uv run snakemake \
#     -s extra/workflow/snakefiles/orchestration/cube_nm_ar_suite.smk \
#     --configfile \
#       extra/workflow/conf/restricted_support_suite.yaml \
#       extra/workflow/conf/missingness_minerva_rezvan.yaml \
#     -j 1 \
#     all
#
# Keep the outer orchestration workflow local (`-j 1`) and let the nested
# `pipeline.smk` invocations submit to SLURM via the profile below.

pipeline_profile: extra/workflow/profiles/minerva_rezvan
default_compute_platform: cpu
compute_platform_devices:
  cpu: cpu
  gpu: cpu
classifier_compute_platform: cpu
slurm_extra_by_compute_platform:
  cpu: ""
  gpu: ""
pipeline_extra_config: ""
