# One-command restricted-support suite for publication plots.
#
# Run with:
#   uv run snakemake \
#     -s extra/workflow/snakefiles/orchestration/cube_nm_ar_suite.smk \
#     --configfile extra/workflow/conf/restricted_support_suite.yaml \
#     -j 1 \
#     all
#
# The outer suite is intentionally serial; each nested `pipeline.smk`
# invocation uses `cube_nm_ar_suite_pipeline_cores`.
#
# This suite is soft-budget only. The phenomenon of interest is premature
# STOP under restricted support, which is not observable in the hard-budget
# regime.

cube_nm_ar_suite_train_initializers: [cube_nm_ar, cold, mcar_p03, mar_p03, mnar_logistic_p03, cube_nm_ar_mar, cube_nm_ar_p01, cube_nm_ar_p05, cube_nm_ar_p07]
cube_nm_ar_suite_mode_train_initializers:
  soft: [cube_nm_ar, cold, mcar_p03, mar_p03, mnar_logistic_p03, cube_nm_ar_mar, cube_nm_ar_p01, cube_nm_ar_p05, cube_nm_ar_p07]
cube_nm_ar_suite_eval_initializers: [cold]
cube_nm_ar_suite_budget_modes: [soft]
cube_nm_ar_suite_dataset: cube_nm_ar
cube_nm_ar_suite_eval_dataset_split: val

cube_nm_ar_suite_methods:
  - gadgil2023
  - gadgil2023_ipw_feature_marginal
  - aaco_full
  - aaco_zero_fill
  - aaco_mask_aware
  - aaco_dr
  - ol_with_mask

cube_nm_ar_suite_mode_methods:
  soft:
    - gadgil2023
    - gadgil2023_ipw_feature_marginal
    - aaco_full
    - aaco_zero_fill
    - aaco_mask_aware
    - aaco_dr
    - ol_with_mask

cube_nm_ar_suite_mode_stop_shield_deltas:
  soft: [0.2, 0.3]

cube_nm_ar_suite_mode_dual_lambdas:
  soft: [0.3, 1.0, 3.0]

cube_nm_ar_suite_stop_shield_deltas: []
cube_nm_ar_suite_dual_lambdas: []
cube_nm_ar_suite_pipeline_cores: 8
cube_nm_ar_suite_pipeline_rerun_incomplete: true
cube_nm_ar_suite_pipeline_config_overrides: []

cube_nm_ar_suite_pipeline_configfiles:
  - extra/workflow/conf/method_options.yaml
  - extra/workflow/conf/pretrain_mapping.yaml
  - extra/workflow/conf/classifier_names.yaml
  - extra/workflow/conf/unmaskers.yaml

cube_nm_ar_suite_mode_configfiles:
  soft:
    - extra/workflow/conf/restricted_support_soft_stop.yaml
