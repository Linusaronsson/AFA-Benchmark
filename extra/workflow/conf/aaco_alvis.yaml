# AACO configuration for Alvis cluster
#
# PREREQUISITE: Train MLP classifiers first!
#   snakemake -s extra/workflow/snakefiles/mlp.smk \
#       --configfile extra/workflow/conf/mlp_alvis.yaml \
#       --profile extra/workflow/profiles/alvis
#
# Usage:
#   snakemake -s extra/workflow/snakefiles/AACO.smk \
#       --configfile extra/workflow/conf/aaco_alvis.yaml \
#       --profile extra/workflow/profiles/alvis

dataset_path_prefix: extra/data
dataset_instance_indices: [0, 1, 2, 3, 4]
eval_dataset_split: test
device: cpu
device_aaco: cpu
device_aaco_nn: cuda
# Per-dataset device overrides - only use GPU for memory-intensive datasets
# This avoids Alvis "inefficient GPU usage" warnings for small tabular datasets
device_aaco_by_dataset:
  imagenette: cuda
  mnist: cuda
  fashion_mnist: cuda
device_aaco_nn_by_dataset:
  imagenette: cuda
  mnist: cuda
  fashion_mnist: cuda
eval_device_by_method:
  aaco: cpu
  aaco_nn: cpu
use_wandb: false
smoke_test: false
initializer: aaco

# ============================================================================
# Datasets
# ============================================================================
datasets:
  # Tabular
  - cube
  - cube_without_noise
  - afa_context
  - afa_context_without_noise
  - actg
  - ckd
  - diabetes
  - physionet
  - miniboone
  - bank_marketing
  # Tabular (flat image) - slow but required
  - mnist
  - fashion_mnist
  # Image (patch-based)
  - synthetic_mnist
  - synthetic_mnist_without_noise
  - imagenette

# ============================================================================
# Unmaskers
# ============================================================================
unmaskers:
  default: direct
  synthetic_mnist: 28x28_to_7x7
  synthetic_mnist_without_noise: 28x28_to_7x7
  imagenette: 224x224_to_7x7

# ============================================================================
# Hard budgets
# ============================================================================
hard_budgets:
  # Small tabular (16-24 features)
  cube: [3, 5, 10]
  cube_without_noise: [3, 5, 10]
  bank_marketing: [3, 5, 10]
  actg: [5, 10, 15]
  ckd: [5, 10, 15]
  # Medium tabular (33-50 features)
  afa_context: [5, 10, 15]
  afa_context_without_noise: [5, 10, 15]
  diabetes: [5, 10, 20]
  physionet: [5, 10, 20]
  miniboone: [5, 15, 25]
  # Flat images (784 features) - use smaller budgets
  mnist: [50, 100, 200]
  fashion_mnist: [50, 100, 200]
  # Patch-based images (49 patches)
  # Patch cost is 16 (4x4), so budgets should be multiples of 16.
  synthetic_mnist: [16, 32, 48]
  synthetic_mnist_without_noise: [16, 32, 48]
  imagenette: [10, 20, 30]

# ============================================================================
# Cost parameters (soft budget)
# ============================================================================
cost_params:
  default: [0.01, 0.05, 0.1]
  # Flat images need lower costs
  mnist: [0.001, 0.005, 0.01]
  fashion_mnist: [0.001, 0.005, 0.01]
  # Patch-based images
  synthetic_mnist: [0.005, 0.01, 0.05]
  synthetic_mnist_without_noise: [0.005, 0.01, 0.05]
  imagenette: [0.005, 0.01, 0.05]

# ============================================================================
# Training options
# ============================================================================
train_aaco_nn: true
soft_budget_eval: true
