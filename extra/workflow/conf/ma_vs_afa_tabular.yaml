# Full comparison config: AFA policies vs MA no-acquisition baseline
# on tabular datasets.

dataset_instance_indices: [0, 1]
initializer: missingness
eval_dataset_split: test
device: cpu
use_wandb: false
smoke_test: false

datasets:
  - cube
  - cube_without_noise
  - cube_nm
  - cube_nm_without_noise

methods:
  - stop_baseline
  - ma2018_external
  - jafa
  - aaco

method_sets:
  ma_vs_afa:
    - stop_baseline
    - ma2018_external
    - jafa
    - aaco

unmaskers:
  default: direct

eval_hard_budgets:
  default: [5, 10]

soft_budget_params:
  stop_baseline:
    default: []
  ma2018_external:
    default:
      - [0.01, null]
  jafa:
    default:
      - [0.01, null]
  aaco:
    default:
      - [0.01, null]
