dataset_instance_indices: [0, 1, 2, 3, 4]
eval_dataset_split: val
stop_shield_deltas: []
cube_nm_ar_budget_mode: soft
device: cpu
use_wandb: false
smoke_test: false

datasets:
  - cube_nm_ar

methods:
  - gadgil2023
  - gadgil2023_ipw_feature_marginal
  - aaco_full
  - aaco_zero_fill
  - aaco_mask_aware

method_sets:
  cube_nm_ar_missingness:
    - gadgil2023
    - gadgil2023_ipw_feature_marginal
    - aaco_full
    - aaco_zero_fill
    - aaco_mask_aware

eval_hard_budgets:
  default: [7]
  cube_nm_ar: [7]

soft_budget_params:
  gadgil2023:
    default: []
    cube_nm_ar:
      - [null, 0.001]
      - [null, 0.005]
      - [null, 0.01]
  gadgil2023_ipw_feature_marginal:
    default: []
    cube_nm_ar:
      - [null, 0.001]
      - [null, 0.005]
      - [null, 0.01]
  aaco_full:
    default: []
    cube_nm_ar:
      - [0.1, 0.1]
      - [0.3, 0.3]
      - [1.2, 1.2]
  aaco_zero_fill:
    default: []
    cube_nm_ar:
      - [0.1, 0.1]
      - [0.3, 0.3]
      - [1.2, 1.2]
  aaco_mask_aware:
    default: []
    cube_nm_ar:
      - [0.1, 0.1]
      - [0.3, 0.3]
      - [1.2, 1.2]
