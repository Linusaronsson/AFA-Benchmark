# Smoke test configuration for AACO (image datasets).
#
# PREREQUISITE: Train MLP classifiers for imagenette first.
#   Update extra/workflow/conf/mlp_smoke_test.yaml to include imagenette,
#   then run:
#   snakemake -s extra/workflow/snakefiles/orchestration/mlp.smk \
#       --configfile extra/workflow/conf/mlp_smoke_test.yaml -j 4
#
# Usage:
#   snakemake -s extra/workflow/snakefiles/orchestration/AACO.smk \
#       --configfile extra/workflow/conf/AACO/image_smoketest.yaml \
#       --configfile extra/workflow/conf/method_options.yaml \
#       --configfile extra/workflow/conf/pretrain_mapping.yaml \
#       --configfile extra/workflow/conf/classifier_names.yaml \
#       -j 4

# Keep this small for a quick image smoke test (imagenette still takes time)
dataset_instance_indices: [0]
initializer: random
eval_dataset_split: val

# CPU is fine for local smoke tests; use *_alvis_* configs for GPU

device: cpu
use_wandb: false
smoke_test: true

# Image datasets (imagenette only)
datasets:
  - imagenette

# Unmaskers (patch-based for 224x224 images)
unmaskers:
  default: 224x224_to_7x7

# Methods
methods:
  - aaco
  - aaco_nn

# Minimal hard budgets for quick testing
eval_hard_budgets:
  default: [10]

# Minimal soft budget params for testing
soft_budget_params:
  aaco:
    default:
      - [0.001, null]
  aaco_nn:
    default:
      - [0.001, null]
