# Tabular-only configuration for AACO experiments.
#
# PREREQUISITE: Train MLP classifiers first!
#   snakemake -s extra/workflow/snakefiles/orchestration/mlp.smk \
#       --configfile extra/workflow/conf/mlp_all.yaml -j 4
#
# Usage:
#   snakemake -s extra/workflow/snakefiles/orchestration/AACO.smk \
#       --configfile extra/workflow/conf/AACO/tabular.yaml \
#       --configfile extra/workflow/conf/method_options.yaml \
#       --configfile extra/workflow/conf/pretrain_mapping.yaml \
#       --configfile extra/workflow/conf/classifier_names.yaml \
#       -j 4

# Dataset instances to use (5 seeds for statistical significance)
dataset_instance_indices: [0, 1, 2, 3, 4]

# Initializer for evaluation (random = random single-feature initializer)
initializer: random

# Which split to evaluate on
eval_dataset_split: test

# Training settings
device: cpu
use_wandb: false
smoke_test: true

# ============================================================================
# Datasets
# ============================================================================
# Tabular datasets for AACO experiments (including MNIST/FashionMNIST).

datasets:
  - actg
  - afa_context
  - afa_context_without_noise
  - bank_marketing
  - ckd
  - cube
  - cube_without_noise
  - diabetes
  - miniboone
  - physionet
  - mnist
  - fashion_mnist

# ============================================================================
# Methods
# ============================================================================
methods:
  - aaco
  - aaco_nn

# ============================================================================
# Unmaskers
# ============================================================================
# Unmaskers determine how selections map to features
# - direct: each selection reveals one feature (tabular data)

unmaskers:
  default: direct

# ============================================================================
# Hard budgets for training and evaluation (eval_hard_budgets)
# ============================================================================
# Hard budget = maximum number of features that can be acquired
# For tabular datasets, 5-15 is a common starting range

eval_hard_budgets:
  default: [5, 10, 15]
  # Small tabular (16-24 features)
  cube: [3, 5, 10]
  cube_without_noise: [3, 5, 10]
  bank_marketing: [3, 5, 10]
  actg: [5, 10, 15]
  ckd: [5, 10, 15]
  # Medium tabular (33-50 features)
  afa_context: [5, 10, 15]
  afa_context_without_noise: [5, 10, 15]
  diabetes: [5, 10, 20]
  physionet: [5, 10, 20]
  miniboone: [5, 15, 25]
  # MNIST-style (784 features)
  mnist: [10, 20, 30]
  fashion_mnist: [10, 20, 30]

# ============================================================================
# Soft budget parameters
# ============================================================================
# Each entry is [train_soft_budget_param, eval_soft_budget_param].
# Set eval to null to reuse the trained cost.

soft_budget_params:
  aaco:
    default:
      - [0.01, null]
      - [0.05, null]
      - [0.1, null]
    # MNIST-style (784 features)
    mnist:
      - [0.0001, null]
      - [0.001, null]
      - [0.01, null]
    fashion_mnist:
      - [0.0001, null]
      - [0.001, null]
      - [0.01, null]
  aaco_nn:
    default:
      - [0.01, null]
      - [0.05, null]
      - [0.1, null]
    mnist:
      - [0.0001, null]
      - [0.001, null]
      - [0.01, null]
    fashion_mnist:
      - [0.0001, null]
      - [0.001, null]
      - [0.01, null]
