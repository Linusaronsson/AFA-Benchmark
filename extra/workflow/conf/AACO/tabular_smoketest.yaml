# Smoke test configuration for AACO (tabular only).
#
# PREREQUISITE: Train MLP classifiers first!
#   snakemake -s extra/workflow/snakefiles/orchestration/mlp.smk \
#       --configfile extra/workflow/conf/mlp_smoke_test.yaml -j 4
#
# Usage:
#   snakemake -s extra/workflow/snakefiles/orchestration/AACO.smk \
#       --configfile extra/workflow/conf/AACO/tabular_smoketest.yaml \
#       --configfile extra/workflow/conf/method_options.yaml \
#       --configfile extra/workflow/conf/pretrain_mapping.yaml \
#       --configfile extra/workflow/conf/classifier_names.yaml \
#       -j 4

# Minimal configuration for quick testing
dataset_instance_indices: [0, 1]

# Random = random single-feature initializer
initializer: random

# Use val split for faster smoke test
eval_dataset_split: val

# Training settings
device: cpu
use_wandb: false
smoke_test: true

# Small tabular datasets only (fast smoke test)
datasets:
  - afa_context

# Methods to run
methods:
  - aaco
  - aaco_nn

# Unmaskers
unmaskers:
  default: direct
  # synthetic_mnist_without_noise: 28x28_to_7x7

# Minimal hard budgets for quick testing
eval_hard_budgets:
  default: [5, 10]

# Minimal soft budget params for testing
soft_budget_params:
  aaco:
    default:
      - [0.05, null]
  aaco_nn:
    default:
      - [0.05, null]
