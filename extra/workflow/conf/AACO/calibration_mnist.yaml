# Calibration run: measure real AACO runtime on MNIST (non-smoke).
#
# Purpose: Run a single seed / single budget combo locally to measure
#   wall-clock time, then use the result to set Alvis timeouts.
#
# Usage:
#   snakemake -s extra/workflow/snakefiles/orchestration/AACO.smk \
#       --configfile \
#         extra/workflow/conf/AACO/calibration_mnist.yaml \
#         extra/workflow/conf/method_options.yaml \
#         extra/workflow/conf/pretrain_mapping.yaml \
#         extra/workflow/conf/classifier_names.yaml \
#       -j 1

dataset_instance_indices: [0]
initializer: random
eval_dataset_split: test

device: cpu
use_wandb: false
smoke_test: false

# ============================================================================
# Datasets
# ============================================================================
datasets:
  - mnist

# ============================================================================
# Methods — aaco_nn to measure real NN training time
# (aaco already calibrated; aaco_nn pretrain reuses aaco)
# ============================================================================
methods:
  - aaco_nn

# ============================================================================
# Unmaskers
# ============================================================================
unmaskers:
  default: direct

# ============================================================================
# Hard budgets — single middle value
# ============================================================================
eval_hard_budgets:
  mnist: [20]

# ============================================================================
# Soft budget parameters — single middle value
# ============================================================================
soft_budget_params:
  aaco_nn:
    mnist:
      - [0.001, null]
