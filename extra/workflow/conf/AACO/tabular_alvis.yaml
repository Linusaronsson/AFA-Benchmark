# AACO configuration for Alvis (tabular datasets only).
#
# PREREQUISITE: Train MLP classifiers first!
#   snakemake -s extra/workflow/snakefiles/orchestration/mlp.smk \
#       --configfile extra/workflow/conf/mlp_alvis.yaml \
#       --profile extra/workflow/profiles/alvis_rezvan
#
# Usage:
#   snakemake -s extra/workflow/snakefiles/orchestration/AACO.smk \
#       --configfile extra/workflow/conf/AACO/tabular_alvis.yaml \
#       --profile extra/workflow/profiles/alvis_rezvan

dataset_path_prefix: extra/data
dataset_instance_indices: [0, 1, 2, 3, 4]
initializer: random
eval_dataset_split: test

# Keep tabular runs on CPU; MNIST/FashionMNIST use GPU overrides below.
device: cpu
device_aaco: cpu
device_aaco_nn: cpu

# Use GPU for MNIST/FashionMNIST even though they are treated as tabular.
device_aaco_by_dataset:
  mnist: cuda
  fashion_mnist: cuda
device_aaco_nn_by_dataset:
  mnist: cuda
  fashion_mnist: cuda
use_wandb: false
smoke_test: false

# ============================================================================
# Datasets
# ============================================================================
# Tabular datasets (including MNIST/FashionMNIST).
datasets:
  - cube
  - cube_without_noise
  - afa_context
  - afa_context_without_noise
  - actg
  - ckd
  - diabetes
  - physionet
  - miniboone
  - bank_marketing
  - mnist
  - fashion_mnist

# ============================================================================
# Unmaskers
# ============================================================================
unmaskers:
  default: direct

# ============================================================================
# Hard budgets
# ============================================================================
hard_budgets:
  default: [5, 10, 15]
  # Small tabular (16-24 features)
  cube: [3, 5, 10]
  cube_without_noise: [3, 5, 10]
  bank_marketing: [3, 5, 10]
  actg: [5, 10, 15]
  ckd: [5, 10, 15]
  # Medium tabular (33-50 features)
  afa_context: [5, 10, 15]
  afa_context_without_noise: [5, 10, 15]
  diabetes: [5, 10, 20]
  physionet: [5, 10, 20]
  miniboone: [5, 15, 25]
  # MNIST-style (784 features)
  mnist: [10, 20, 30]
  fashion_mnist: [10, 20, 30]

# ============================================================================
# Soft budget parameters
# ============================================================================
soft_budget_params:
  default: [0.01, 0.05, 0.1]
  # MNIST-style (784 features)
  mnist: [0.0001, 0.001, 0.01]
  fashion_mnist: [0.0001, 0.001, 0.01]

# ============================================================================
# Training options
# ============================================================================
train_aaco_nn: true
soft_budget_eval: true
