# AACO configuration for Alvis (image datasets).
#
# PREREQUISITE: Train MLP classifiers for imagenette first.
#   Extend extra/workflow/conf/mlp_alvis.yaml to include imagenette,
#   then run:
#   snakemake -s extra/workflow/snakefiles/orchestration/mlp.smk \
#       --configfile extra/workflow/conf/mlp_alvis.yaml \
#       --profile extra/workflow/profiles/alvis_rezvan
#
# Usage:
#   snakemake -s extra/workflow/snakefiles/orchestration/AACO.smk \
#       --configfile extra/workflow/conf/AACO/image_alvis.yaml \
#       --configfile extra/workflow/conf/method_options.yaml \
#       --configfile extra/workflow/conf/pretrain_mapping.yaml \
#       --configfile extra/workflow/conf/classifier_names.yaml \
#       --profile extra/workflow/profiles/alvis_rezvan
dataset_instance_indices: [0, 1, 2, 3, 4]
initializer: random
eval_dataset_split: test

# Run image workloads on GPU.
device: cuda
use_wandb: false
smoke_test: false

# Image datasets (imagenette only)
datasets:
  - imagenette

# Unmaskers (patch-based for 224x224 images)
unmaskers:
  default: 224x224_to_7x7

# Methods
methods:
  - aaco
  - aaco_nn

# Hard budgets for 224x224 images (49 patches)
eval_hard_budgets:
  default: [10, 20, 30]

# Soft budget parameters
soft_budget_params:
  aaco:
    default:
      - [0.0001, null]
      - [0.001, null]
      - [0.01, null]
  aaco_nn:
    default:
      - [0.0001, null]
      - [0.001, null]
      - [0.01, null]
