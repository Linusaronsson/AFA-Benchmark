# Smoke test configuration for AACO on Alvis (tabular only).
#
# PREREQUISITE: Train MLP classifiers first!
#   Update extra/workflow/conf/mlp_smoke_test.yaml to include mnist,
#   then run:
#   snakemake -s extra/workflow/snakefiles/orchestration/mlp.smk \
#       --configfile extra/workflow/conf/mlp_smoke_test.yaml \
#       --profile extra/workflow/profiles/alvis_rezvan
#
# Usage:
#   snakemake -s extra/workflow/snakefiles/orchestration/AACO.smk \
#       --configfile extra/workflow/conf/AACO/tabular_alvis_smoketest.yaml \
#       --configfile extra/workflow/conf/method_options.yaml \
#       --configfile extra/workflow/conf/pretrain_mapping.yaml \
#       --configfile extra/workflow/conf/classifier_names.yaml \
#       --profile extra/workflow/profiles/alvis_rezvan
dataset_instance_indices: [0, 1]
initializer: random
eval_dataset_split: val

# Keep tabular smoke tests on CPU; override device at runtime if needed.
device: cpu
use_wandb: false
smoke_test: true

datasets:
  - cube_without_noise
  - afa_context_without_noise
  - mnist

unmaskers:
  default: direct

# Methods
methods:
  - aaco
  - aaco_nn

eval_hard_budgets:
  default: [5]
  mnist: [10]

soft_budget_params:
  aaco:
    default:
      - [0.05, null]
    mnist:
      - [0.001, null]
  aaco_nn:
    default:
      - [0.05, null]
    mnist:
      - [0.001, null]
