# Compare train-missing conditions while keeping evaluation cold.
#
# This is the generic initializer-comparison entrypoint for the train-missing
# ablation workflow. Use the same kind of CLI overrides as the original
# pipeline, for example:
#
#   uv run snakemake \
#     -s extra/workflow/snakefiles/orchestration/initializer_comparison.smk \
#     --configfile extra/workflow/conf/train_missing_eval_cold_initializer_comparison.yaml \
#     --config \
#       "datasets=[cube_without_noise]" \
#       "methods=[gadgil2023,gadgil2023_ipw_feature_marginal,aaco_full,aaco_zero_fill,aaco_mask_aware,aaco_dr]" \
#     -j 1 \
#     all

train_initializers:
  - cold
  - mcar_p03
  - mcar_p05
  - mcar_p07
  - mar_p03
  - mar_p05
  - mar_p07
  - mnar_logistic_p03
  - mnar_logistic_p05
  - mnar_logistic_p07
eval_initializer: cold
eval_dataset_split: val
classifier_types: [external]
comparison_method_set_name: train_missing_eval_cold

pipeline_configfiles:
  - extra/workflow/conf/train_missing_eval_cold_hard.yaml
  - extra/workflow/conf/datasets_main.yaml
  - extra/workflow/conf/methods.yaml
  - extra/workflow/conf/method_sets.yaml
  - extra/workflow/conf/eval_hard_budgets.yaml
  - extra/workflow/conf/soft_budget_params_none.yaml
  - extra/workflow/conf/method_options.yaml
  - extra/workflow/conf/pretrain_mapping.yaml
  - extra/workflow/conf/classifier_names.yaml
  - extra/workflow/conf/unmaskers.yaml

pipeline_cores: 8
pipeline_rerun_incomplete: true
pipeline_extra_config: ""

plot_budget_mode: hard
plot_eval_hard_budget: null
plot_keep_largest_hard_budget: true
