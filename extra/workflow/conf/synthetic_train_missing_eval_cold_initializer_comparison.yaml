# Compare synthetic train-missing conditions while keeping evaluation cold.
#
# Run with:
#   uv run snakemake \
#     -s extra/workflow/snakefiles/orchestration/initializer_comparison.smk \
#     --configfile extra/workflow/conf/synthetic_train_missing_eval_cold_initializer_comparison.yaml \
#     -j 1 \
#     all

train_initializers:
  - cold
  - mcar_p01
  - mcar_p03
  - mcar_p05
  - mar_p01
  - mar_p03
  - mar_p05
  - mnar_logistic_p01
  - mnar_logistic_p03
  - mnar_logistic_p05
eval_initializer: cold
eval_dataset_split: val
classifier_types: [external]

method_sets:
  synthetic_train_missing_eval_cold_core:
    - jafa
    - aaco_dr
    - aaco_mask_aware
    - gadgil2023_ipw_feature_marginal
  synthetic_train_missing_eval_cold_controls:
    - jafa
    - aaco_full
    - aaco_mask_aware
    - aaco_dr
    - gadgil2023
    - gadgil2023_ipw_feature_marginal

pipeline_configfiles:
  - extra/workflow/conf/synthetic_train_missing_eval_cold_hard.yaml
  - extra/workflow/conf/method_options.yaml
  - extra/workflow/conf/pretrain_mapping.yaml
  - extra/workflow/conf/classifier_names.yaml
  - extra/workflow/conf/unmaskers.yaml

pipeline_cores: 8
pipeline_rerun_incomplete: true
pipeline_extra_config: ""
