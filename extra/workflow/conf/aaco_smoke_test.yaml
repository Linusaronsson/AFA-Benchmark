# Smoke test configuration for AACO workflow
# Quick test to verify the pipeline works

# Use existing data directory
dataset_path_prefix: extra/data

dataset_instance_indices: [0, 1]
initializer: aaco
eval_dataset_split: val
device: cpu
use_wandb: false
smoke_test: true

# Just one small dataset for testing
datasets:
  - cube_without_noise
  - afa_context_without_noise
  - synthetic_mnist_fast

# Unmaskers
unmaskers:
  default: direct
  synthetic_mnist_fast: 28x28_to_7x7

# Hard budgets for evaluation
hard_budgets:
  default: [5, 10, 15]
  synthetic_mnist_fast: [16, 32, 48]

# Just one cost param for testing
cost_params:
  default: [0.05, 0.1, 0.2]

train_aaco_nn: true
soft_budget_eval: true
