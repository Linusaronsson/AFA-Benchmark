# Smoke test configuration for AACO workflow
#
# PREREQUISITE: Train MLP classifiers first!
#   snakemake -s extra/workflow/snakefiles/mlp.smk \
#       --configfile extra/workflow/conf/mlp_smoke_test.yaml -j 4
#
# Quick test to verify the AACO pipeline works end-to-end.
# smoke_test=true reduces epochs and samples in training scripts.
#
# Usage:
#   snakemake -s extra/workflow/snakefiles/AACO.smk \
#       --configfile extra/workflow/conf/aaco_smoke_test.yaml -j 4

# Data paths
dataset_path_prefix: extra/data

# Minimal configuration for quick testing
dataset_instance_indices: [0, 1]
# random = random single-feature initializer
initializer: random
eval_dataset_split: val  # Use val split for faster smoke test
device: cpu
use_wandb: false
smoke_test: true  # Reduces epochs and samples

# Small tabular datasets only (no images for faster testing)
datasets:
  - cube_without_noise
  - afa_context_without_noise

# Unmaskers
unmaskers:
  default: direct

# Minimal hard budgets for quick testing
hard_budgets:
  default: [5, 10]

# Just a couple cost params for testing
cost_params:
  default: [0.05, 0.1]

# Test both AACO and AACO+NN
train_aaco_nn: true
soft_budget_eval: false  # Skip soft budget eval in smoke test for speed
