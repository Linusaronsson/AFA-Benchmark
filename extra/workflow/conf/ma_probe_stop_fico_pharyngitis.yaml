# Shared runtime config for MA-only probing on the two MA-learn datasets.
#
# Designed to be combined with:
# - method_options.yaml
# - pretrain_mapping.yaml
# - unmaskers.yaml
# - classifier_names_malearn_<variant>.yaml
#
# and overridden initializer, e.g.:
# --config initializer='missingness_marf'

methods:
  - stop_baseline

method_sets:
  ma_probe:
    - stop_baseline

datasets:
  - fico
  - pharyngitis

dataset_instance_indices:
  - 0

eval_hard_budgets:
  default: [5]

soft_budget_params:
  stop_baseline:
    default: []

eval_dataset_split: val
device: cpu
use_wandb: false
smoke_test: false
