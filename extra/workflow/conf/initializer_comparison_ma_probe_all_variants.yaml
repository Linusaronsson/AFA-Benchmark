# Cross-initializer comparison for all MA classifier variants.
#
# Expects upstream merged outputs for each initializer in the list below.

eval_dataset_split: val

initializers:
  - missingness_marf
  - missingness_all_observed_marf
  - missingness_madt
  - missingness_all_observed_madt
  - missingness_magbt
  - missingness_all_observed_magbt
  - missingness_malasso
  - missingness_all_observed_malasso

method_sets:
  ma_probe:
    - stop_baseline

classifier_types:
  - external
