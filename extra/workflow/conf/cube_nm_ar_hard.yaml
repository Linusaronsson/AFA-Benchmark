# Focused CUBE-NM-AR run for planning under a hard deadline.
#
# This file is a leaf config for `cube_nm_ar_suite.smk`.

dataset_instance_indices: [0, 1, 2, 3, 4]
train_initializer: cube_nm_ar
# Override train_initializer=cold for the full-support baseline.
eval_initializer: cold
eval_dataset_split: val
stop_shield_deltas: []
dual_lambdas: []
cube_nm_ar_budget_mode: hard
device: cpu
use_wandb: false
smoke_test: false

datasets:
  - cube_nm_ar

methods:
  - gadgil2023
  - gadgil2023_ipw_feature_marginal
  - aaco_full
  - aaco_zero_fill
  - aaco_mask_aware
  - aaco_dr
  - cube_nm_ar_oracle

method_sets:
  cube_nm_ar_hard:
    - gadgil2023
    - gadgil2023_ipw_feature_marginal
    - aaco_full
    - aaco_zero_fill
    - aaco_mask_aware
    - aaco_dr
    - cube_nm_ar_oracle

eval_hard_budgets:
  default: [6, 7, 8]
  cube_nm_ar: [6, 7, 8]

soft_budget_params:
  gadgil2023:
    default: []
    cube_nm_ar: []
  gadgil2023_ipw_feature_marginal:
    default: []
    cube_nm_ar: []
  aaco_full:
    default: []
    cube_nm_ar: []
  aaco_zero_fill:
    default: []
    cube_nm_ar: []
  aaco_mask_aware:
    default: []
    cube_nm_ar: []
  aaco_dr:
    default: []
    cube_nm_ar: []
  cube_nm_ar_oracle:
    default: []
    cube_nm_ar: []
