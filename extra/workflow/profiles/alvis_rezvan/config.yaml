# Snakemake profile for Alvis SLURM cluster (Rezvan)
#
# This profile submits jobs to SLURM instead of running locally.
# Note: Alvis does NOT allow direct memory requests.

executor: slurm
jobs: 50
latency-wait: 60
retries: 2

default-resources:
  slurm_partition: alvis
  slurm_account: NAISS2025-22-448
  runtime: 60
  slurm_extra: "--constraint=NOGPU"
  mem_mb: 0 # Alvis rejects direct memory requests; keep unset in sbatch.

set-resources:
  train_classifier:
    runtime: 120
  train_masked_mlp_classifier:
    runtime: 120
    slurm_extra: "--gres=gpu:T4:1"
  pretrain_model:
    runtime: 360 # 6 hours
  train_method_with_pretrained_model:
    runtime: 600 # ~8-9h for AACO_NN on MNIST/FashionMNIST (784 features)
  train_method_without_pretrained_model:
    runtime: 600 # ~8-9h for AACO_NN on MNIST/FashionMNIST (784 features)
  # Evaluation — the actual rule name in evaluation.smk is "eval_method"
  eval_method:
    runtime: 420 # ~2h28m measured for MNIST soft budget eval (worst case)
  # Post-processing rules
  count_selections:
    runtime: 30
  count_selections_soft:
    runtime: 30
  add_metadata_to_eval_data:
    runtime: 30
  add_metadata_to_eval_data_soft:
    runtime: 30
  pivot_long_classifier:
    runtime: 10
  pivot_long_classifier_soft:
    runtime: 10
  merge_eval:
    runtime: 30
  plot:
    runtime: 30
