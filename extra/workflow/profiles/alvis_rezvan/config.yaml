# Snakemake profile for Alvis SLURM cluster (Rezvan)
#
# This profile submits jobs to SLURM instead of running locally.
# Note: Alvis does NOT allow direct memory requests.

executor: slurm
jobs: 50
latency-wait: 60
retries: 2

default-resources:
  slurm_partition: alvis
  # slurm_account: NAISS2025-22-448
  slurm_account: NAISS2026-4-39
  runtime: 60
  slurm_extra: "--constraint=NOGPU"
  mem_mb: 0 # Alvis rejects direct memory requests; keep unset in sbatch.

set-resources:
  train_classifier:
    runtime: 120
  train_masked_mlp_classifier:
    runtime: 120
    slurm_extra: "--gres=gpu:T4:1"
  pretrain_model:
    runtime: 1440 # 24h
  train_method_with_pretrained_model:
    runtime: 2880 # 48h — 24h was insufficient for aaco_nn on MNIST/FashionMNIST high budgets
  train_method_without_pretrained_model:
    runtime: 1440 # 24h
  # Evaluation — the actual rule name in evaluation.smk is "eval_method"
  eval_method:
    runtime: 1440 # 24h — 12h was insufficient for aaco eval on MNIST/FashionMNIST budget=30
  eval_method_shielded:
    runtime: 1440 # 24h — threshold shielding shares the same eval bottlenecks
  eval_method_dualized:
    runtime: 1440 # 24h — dualized stop evaluation shares the same bottlenecks
  # Post-processing rules
  count_selections:
    runtime: 30
  count_selections_soft:
    runtime: 30
  add_metadata_to_eval_data:
    runtime: 30
  add_metadata_to_eval_data_soft:
    runtime: 30
  pivot_long_classifier:
    runtime: 10
  pivot_long_classifier_soft:
    runtime: 10
  merge_eval:
    runtime: 30
  plot:
    runtime: 30
