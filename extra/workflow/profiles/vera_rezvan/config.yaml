executor: slurm
# Avoid flooding the queue while still leaving room for CPU-heavy sweeps.
jobs: 16
latency-wait: 30 # seconds

default-resources:
  slurm_partition: vera
  slurm_account: C3SE2026-1-12
  runtime: 120 # minutes
  cpus_per_task: 1
  mem_mb: 4000

set-resources:
  pretrain_model:
    runtime: 6000 # 100 hours
    cpus_per_task: 4
  train_method_with_pretrained_model:
    runtime: 6000 # 100 hours
    mem_mb: 32000
    cpus_per_task: 4
  train_method_without_pretrained_model:
    runtime: 6000 # 100 hours
    mem_mb: 16000
    cpus_per_task: 4
  eval_method:
    runtime: 6000 # 100 hours
    mem_mb: 16000
    cpus_per_task: 4
  eval_method_shielded:
    runtime: 6000 # 100 hours
    mem_mb: 16000
    cpus_per_task: 4
  eval_method_dualized:
    runtime: 6000 # 100 hours
    mem_mb: 16000
    cpus_per_task: 4
